name: Auto Sign Tasks

on:
  schedule:
    - cron: '0 0 * * *'   # 北京时间 08:00
  workflow_dispatch:

permissions:
  contents: write   # ⭐ 必须加，不然不能 push best_ip.txt

jobs:
  sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run sign scripts
        env:
          BARK_URL_TIEBA_QIANDAO: ${{ secrets.BARK_URL_TIEBA_QIANDAO }}
          BDUSS_TIEBA_QIANDAO: ${{ secrets.BDUSS_TIEBA_QIANDAO }}
          JD_COOKIE: ${{ secrets.JD_COOKIE }}
        run: |
          echo "===== 开始执行签到脚本 ====="

           if [ -f scripts/auto-tieba-qiandao.py ]; then
             python scripts/auto-tieba-qiandao.py || true
           fi

          # if [ -f scripts/jd_sign.py ]; then
          #   python scripts/jd_sign.py || true
          # fi

          # if [ -f scripts/bili_sign.py ]; then
          #   python scripts/bili_sign.py || true
          # fi

          echo "===== 所有签到脚本执行完成 ====="
      - name: Update README
        run: |
          # 1. 设置北京时间
          export TZ='Asia/Shanghai'
          RUN_TIME=$(date "+%Y-%m-%d %H:%M:%S")
          
          # 2. 构造要显示的内容 (使用变量简化)
          # 注意：这里的 TIEBA_STATUS 是从上一步的 $GITHUB_ENV 获取的
          STATUS="${{ env.TIEBA_STATUS }}"
          
          # 3. 准备完整的插入文本
          # \n 是换行符，确保 Markdown 格式正确
          INFO="#### 🤖 最近运行信息\n- **运行脚本**: \`auto-tieba-qiandao.py\`\n- **运行时间**: $RUN_TIME (CST)\n- **运行结果**: $STATUS"
          
          # 4. 核心替换逻辑 (更加健壮的 perl 写法)
          # 它会把 README.md 中 和 之间的内容替换掉
          perl -i -0777 -pe "s/().*()/\$1\n$INFO\n\$2/s" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 检查是否有文件改动，防止因为没有变动而报错
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 🤖 自动更新运行状态 ($RUN_TIME)"
            git push
          fi

